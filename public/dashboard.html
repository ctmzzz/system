<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>成绩分析 - 成绩分析系统</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    
    <style>
        .user-info.show { opacity:1; }
    </style>
    <style>
        .dashboard-header {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            padding: 30px;
            border-radius: 16px;
            margin-bottom: 30px;
        }
        .dashboard-header h1 { font-size: 1.8rem; margin-bottom: 20px; }
        .dashboard-controls {
            display: flex; gap: 20px; align-items: center; flex-wrap: wrap;
        }
        .dashboard-controls select {
            padding: 10px 20px; border: 2px solid rgba(255,255,255,0.3);
            border-radius: 10px; background: rgba(255,255,255,0.1);
            color: white; font-size: 1rem; cursor: pointer; min-width: 250px;
        }
        .dashboard-controls select option { color: var(--text-primary); }
        .dashboard-controls select:focus { border-color: white; outline: none; }
        .user-info-card {
            background: rgba(255,255,255,0.15); padding: 15px 25px;
            border-radius: 10px; display: flex; gap: 30px;
        }
        .user-info-item { display: flex; flex-direction: column; }
        .user-info-label { font-size: 0.85rem; opacity: 0.8; margin-bottom: 4px; }
        .user-info-value { font-size: 1.1rem; font-weight: 600; }
        .logout-btn-white {
            padding: 10px 25px; background: rgba(255,255,255,0.2);
            color: white; border: 2px solid rgba(255,255,255,0.4);
            border-radius: 10px; cursor: pointer; font-size: 1rem; transition: all 0.3s;
        }
        .logout-btn-white:hover { background: rgba(255,255,255,0.3); }
        .chart-row {
            display: grid; grid-template-columns: 1fr 2fr; gap: 24px; margin-bottom: 24px;
        }
        .chart-card {
            background: var(--card-bg); border-radius: 16px;
            padding: 24px; box-shadow: var(--shadow);
        }
        .chart-card-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid var(--border-color);
        }
        .chart-card-title { font-size: 1.1rem; font-weight: 600; color: var(--text-primary); }
        .chart-card-badge {
            background: var(--bg-color); padding: 6px 14px; border-radius: 20px;
            font-size: 0.85rem; color: var(--text-secondary);
        }
        .chart-body { height: 350px; }
        .no-data {
            height: 350px; display: flex; align-items: center; justify-content: center;
            color: var(--text-secondary); font-size: 1.1rem;
            background: var(--bg-color); border-radius: 12px;
        }
        .full-width { grid-column: 1 / -1; }
        .ranking-list { height: 100%; overflow-y: auto; }
        .ranking-list::-webkit-scrollbar { width: 6px; }
        .ranking-list::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
        .ranking-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
        .ranking-table thead { position: sticky; top: 0; z-index: 1; }
        .ranking-table th {
            background: #f3f4f6; color: #6b7280; font-weight: 600;
            padding: 10px 14px; text-align: left; border-bottom: 2px solid #e5e7eb;
            font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.5px;
        }
        .ranking-table td { padding: 9px 14px; border-bottom: 1px solid #f3f4f6; color: #374151; }
        .ranking-table tr:hover td { background: #f9fafb; }
        .ranking-table tr.rank-gold td:first-child { color: #f59e0b; font-weight: 700; }
        .ranking-table tr.rank-silver td:first-child { color: #9ca3af; font-weight: 700; }
        .ranking-table tr.rank-bronze td:first-child { color: #cd7f32; font-weight: 700; }
        .ranking-table td:first-child { width: 50px; text-align: center; }
        .ranking-table td:last-child { font-weight: 600; text-align: right; font-variant-numeric: tabular-nums; }
        .ranking-empty {
            height: 100%; display: flex; align-items: center;
            justify-content: center; color: var(--text-secondary); font-size: 1.1rem;
        }
        .stats-summary {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 24px;
        }
        .stat-box {
            background: var(--card-bg); border-radius: 16px;
            padding: 24px; box-shadow: var(--shadow); text-align: center;
        }
        .stat-box-value {
            font-size: 2.2rem; font-weight: 700;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; margin-bottom: 8px;
        }
        .stat-box-label { color: var(--text-secondary); font-size: 0.95rem; }
        .student-header {
            background: linear-gradient(135deg, #059669, #10B981);
            color: white; padding: 30px; border-radius: 16px; margin-bottom: 24px;
        }
        .student-header h1 { font-size: 1.8rem; margin-bottom: 6px; }
        .student-header .subtitle { opacity: 0.85; font-size: 0.95rem; }
        @media (max-width: 1024px) {
            .chart-row { grid-template-columns: 1fr; }
            .stats-summary { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 768px) {
            .stats-summary { grid-template-columns: 1fr; }
            .user-info-card { flex-direction: column; gap: 15px; }
        }
    </style>
</head>
<body>
    <script>
    (function() {

        xhr.open('GET', '/api/auth/check', false);
        xhr.send();
        if (xhr.status === 200) {
            var data = JSON.parse(xhr.responseText);

                var s2 = document.createElement('style');
                s2.textContent = '#navPeriodStats{display:none!important}';
                document.head.appendChild(s2);
            }
        }
    })();
    </script>

            </nav>
                    <script>
        (function restoreSidebarUser(){const avatar=localStorage.getItem('sidebarUserAvatar');const name=localStorage.getItem('sidebarUserName');const avEl=document.getElementById('userAvatar');const nmEl=document.getElementById('userName');if(avatar&&avEl)avEl.textContent=avatar;if(name&&nmEl)nmEl.textContent=name;})();
    </script>
            <div class="sidebar-footer">
                <div class="user-info" style="cursor:pointer;" onclick="openPasswordModal()">
                    <div class="user-avatar" id="userAvatar"></div>
                    <div class="user-details">
                        <div class="user-name" id="userName"></div>
                        <div style="font-size:0.7rem;color:#94a3b8;">点击修改密码</div>
                    </div>
                </div>
                <button type="button" class="logout-btn" onclick="logout()" style="margin-top:15px;width:100%;">退出登录</button>
            </div>
        </aside>
        <!-- 修改密码弹窗 -->
        <div class="modal-overlay" id="passwordModal" style="display:none;">
            <div class="modal" style="max-width:360px;">
                <div class="modal-header">
                    <h2 class="modal-title">修改密码</h2>
                    <button class="modal-close" onclick="closeModal('passwordModal')">✕</button>
                </div>
                <div class="modal-form" style="padding:20px;">
                    <div class="form-group"><label>当前密码</label><input type="password" id="oldPassword" style="width:100%;padding:10px 12px;border:2px solid var(--border-color);border-radius:8px;font-size:0.95rem;" placeholder="输入当前密码"></div>
                    <div class="form-group" style="margin-top:12px;"><label>新密码</label><input type="password" id="newPassword" style="width:100%;padding:10px 12px;border:2px solid var(--border-color);border-radius:8px;font-size:0.95rem;" placeholder="输入新密码（至少4位）"></div>
                    <div class="form-group" style="margin-top:12px;"><label>确认新密码</label><input type="password" id="confirmPassword" style="width:100%;padding:10px 12px;border:2px solid var(--border-color);border-radius:8px;font-size:0.95rem;" placeholder="再次输入新密码"></div>
                    <div id="passwordError" style="color:#DC2626;font-size:0.85rem;margin-top:8px;display:none;"></div>
                    <div class="modal-actions" style="margin-top:16px;">

                        <button type="button" class="btn btn-primary" onclick="changePassword()">确认修改</button>
                    </div>
                </div>
            </div>
        </div>
        <!-- 主内容区 -->
    <style>
        @keyframes annScroll {

    </style>
    <main class="main-content">
            <div class="page-content">

                <!-- 学生视角：我的成绩 -->

                    <div class="student-header">

                        <div class="subtitle">查看各次考试的个人成绩分析</div>
                    </div>
                    <div style="margin-bottom:20px;">

                        <div class="stat-box">

                    </div>

                <div class="chart-card full-width">

                    </div>

                <div class="chart-card" style="margin-top:24px;">
                    <div class="chart-card-header">

                    </div>
                    <div class="chart-body" id="trendChart" style="height:400px;"></div>
                </div>
                </div>

            </div>
        </main>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/collab.js"></script>
    <script src="/js/dashboard.js"></script>
    <script>
        function toggleSubMenu(el) {
            el.classList.toggle('expanded');
            const sub = el.nextElementSibling;
            if (sub) sub.classList.toggle('expanded');
        }
        function openPasswordModal() {
            document.getElementById('oldPassword').value='';document.getElementById('newPassword').value='';document.getElementById('confirmPassword').value='';
            document.getElementById('passwordError').style.display='none';document.getElementById('passwordModal').style.display='flex';
        }
        function closeModal(id){document.getElementById(id).style.display='none';}
        async function changePassword() {
            var o=document.getElementById('oldPassword').value,n=document.getElementById('newPassword').value,c=document.getElementById('confirmPassword').value,e=document.getElementById('passwordError');
            if(!o||!n){e.textContent='请填写完整';e.style.display='block';return;}
            if(n.length<4){e.textContent='新密码至少4位';e.style.display='block';return;}
            if(n!==c){e.textContent='两次密码不一致';e.style.display='block';return;}
            try{var r=await fetch('/api/change-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({old_password:o,new_password:n})});var d=await r.json();if(d.success){closeModal('passwordModal');alert('密码修改成功');}else{e.textContent=d.message||'修改失败';e.style.display='block';}}catch(er){e.textContent='网络错误';e.style.display='block';}
        }
    </script>
    <script src="/js/ai-chat.js"></script>
