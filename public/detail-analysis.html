<head>
    <meta charset="UTF-8">

    <style>

    <style>
        .da-header {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            padding: 30px;
            border-radius: 16px;
            margin-bottom: 30px;
        }
        .da-header h1 { font-size: 1.8rem; margin-bottom: 20px; }
        .da-controls {
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
        }
        .da-controls select {
            padding: 10px 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 10px;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 1rem;
            cursor: pointer;
            min-width: 200px;
        }
        .da-controls select option { color: var(--text-primary); }
        .da-controls select:focus { border-color: white; outline: none; }
        .da-info {
            display: flex;
            gap: 20px;
            background: rgba(255,255,255,0.15);
            padding: 12px 24px;
            border-radius: 10px;
        }
        .da-info-item { display: flex; flex-direction: column; }
        .da-info-label { font-size: 0.85rem; opacity: 0.8; }
        .da-info-value { font-size: 1.1rem; font-weight: 600; }
        .chart-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .detail-chart-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            box-shadow: var(--shadow);
        }
        .detail-chart-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-color);
        }
        .detail-chart-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
        }
        .detail-chart-body { height: 340px; }
        .da-empty {
            text-align: center;
            color: var(--text-secondary);
            font-size: 1.2rem;
            padding: 120px 0;
        }
        
        .homework-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid #e2e8f0;
            background: #f8fafc;
            margin-bottom: 8px;
            border-radius: 8px;
        }
        .homework-item:last-child {
            margin-bottom: 0;
        }
        .homework-left {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .homework-date {
            font-size: 13px;
            color: #64748b;
        }
        .homework-subject {
            font-size: 15px;
            font-weight: 600;
            color: #1e1b4b;
        }
        .homework-status {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .status-badge {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
        }
        .status-submitted {
            background: #dcfce7;
            color: #16a34a;
        }
        .status-unsubmitted {
            background: #fee2e2;
            color: #dc2626;
        }
        .status-late {
            background: #fef3c7;
            color: #d97706;
        }
        .homework-empty {
            text-align: center;
            color: #94a3b8;
            padding: 40px 0;
            font-size: 14px;
        }
        .detail-chart-card.full-width { grid-column: 1 / -1; }
        @media (max-width: 1024px) {
            .chart-grid { grid-template-columns: 1fr; }
        }
        #printBtn.print-btn-busy { opacity: 0.65; cursor: wait; }
    </style>
</head>

            }
        }
    })();

    <script>
        function toggleSubMenu(el) {
            el.classList.toggle('expanded');
            const sub = el.nextElementSibling;
            if (sub) sub.classList.toggle('expanded');
        }
    
        function openPasswordModal(){document.getElementById("oldPassword").value="";document.getElementById("newPassword").value="";document.getElementById("confirmPassword").value="";document.getElementById("passwordError").style.display="none";document.getElementById("passwordModal").style.display="flex";}
        function closeModal(id){document.getElementById(id).style.display="none";}
        async function changePassword(){var o=document.getElementById("oldPassword").value,n=document.getElementById("newPassword").value,c=document.getElementById("confirmPassword").value,e=document.getElementById("passwordError");if(!o||!n){e.textContent="请填写完整";e.style.display="block";return;}if(n.length<4){e.textContent="新密码至少4位";e.style.display="block";return;}if(n!==c){e.textContent="两次密码不一致";e.style.display="block";return;}try{var r=await fetch("/api/change-password",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({old_password:o,new_password:n})});var d=await r.json();if(d.success){closeModal("passwordModal");alert("密码修改成功");}else{e.textContent=d.message||"修改失败";e.style.display="block";}}catch(er){e.textContent="网络错误";e.style.display="block";}}</script>
