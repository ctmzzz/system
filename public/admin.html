<!DOCTYPE html>

<head>

                                </tr>
                            </thead>

                            </tbody>

<script>
// 异常账号标签页切换时自动加载（内联，绕过缓存）
(function() {
    var tabBtns = document.querySelectorAll('.tab-btn');
    tabBtns.forEach(function(btn) {
        btn.addEventListener('click', function() {
            if (this.dataset.tab === 'abnormal') {
                loadAbnormalAccounts();
            }
        });
    });

    async function loadAbnormalAccounts() {
        try {
            var res = await fetch('/api/abnormal-accounts');
            var data = await res.json();
            var tbody = document.getElementById('abnormalAccountsTable');
            if (!data.success || !data.data || data.data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:#94a3b8;padding:40px;">暂无异常账号</td></tr>';
                return;
            }
            var typeLabels = { 'kick': '互踢', 'abnormal': '异常', 'fail': '登录失败' };
            tbody.innerHTML = data.data.map(function(acc) {
                var timeStr = acc.time ? new Date(acc.time).toLocaleString() : '-';
                return '<tr>' +
                    '<td>' + acc.employee_id + '</td>' +
                    '<td>' + acc.name + '</td>' +
                    '<td>' + (typeLabels[acc.type] || acc.type || '-') + '</td>' +
                    '<td><button class="btn btn-secondary" onclick="removeAbnormal(\'' + acc.employee_id + '\')" style="padding:4px 12px;font-size:0.8rem;">解除异常</button></td>' +
                    '</tr>';
            }).join('');
        } catch(e) {}
    }

    window.removeAbnormal = async function(employeeId) {
        if (!confirm('确定要解除账号 ' + employeeId + ' 的异常状态吗？')) return;
        try {
            var res = await fetch('/api/abnormal-accounts/remove', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ employee_id: employeeId })
            });
            var data = await res.json();
            if (data.success) {
                alert('已解除异常状态');
                loadAbnormalAccounts();
            } else {
                alert(data.message || '操作失败');
            }
        } catch(e) {
            alert('操作失败');
        }
    };
})();
</script>

    <script>
        // 内联的 renderUsers 函数，确保按钮显示
        window.renderUsers = function(users) {
            const tbody = document.getElementById('usersTable');
            if (!users || users.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:30px;color:var(--text-secondary);">暂无数据</td></tr>';
                return;
            }
            const ROLE_LABELS = { 'admin': '管理员', 'teacher': '教师', 'class': '班级', 'student': '学生' };
            tbody.innerHTML = users.map(user => `
                <tr>
                    <td>${user.employee_id}</td>
                    <td>${user.name}</td>
                    <td>${user.plain_password || '-'}</td>
                    <td>${ROLE_LABELS[user.role] || '教师'}</td>
                    <td>
                        <div class="action-btns">
                            <button class="action-btn edit" onclick="editUser(${user.id}, '${user.employee_id}', '${user.name}', '${user.role}', '${user.plain_password || ''}')" title="编辑" style="background:#E0F2FE;">
                                <svg viewBox="0 0 24 24" width="16" height="16" fill="#0284C7"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
                            </button>
                            ${user.employee_id === 'admin' ? '' : `
                            <button class="action-btn" onclick="markAsAbnormal('${user.employee_id}', '${user.name}')" title="标记异常" style="background:#FEE2E2;color:#EF4444;">
                                <svg viewBox="0 0 24 24" width="16" height="16" fill="#EF4444"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
                            </button>
                            <button class="action-btn delete" onclick="deleteUser(${user.id})" title="删除" style="background:#FEE2E2;">
                                <svg viewBox="0 0 24 24" width="16" height="16" fill="#EF4444"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
                            </button>`}
                        </div>
                    </td>
                </tr>
            `).join('');
        };

        // 内联的 markAsAbnormal 函数
        window.markAsAbnormal = async function(employeeId, name) {
            if (!confirm(`确定要将账号 ${name} (${employeeId}) 标记为异常吗？\n\n标记后该账号将无法登录！`)) return;
            try {
                const res = await fetch('/api/abnormal-accounts/add', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ employee_id: employeeId, name: name })
                });
                const data = await res.json();
                if (data.success) {
                    alert('已标记为异常');
                    loadUsers();
                } else {
                    alert(data.message || '操作失败');
                }
            } catch (err) {
                alert('操作失败');
            }
        };
    </script>

    <script>

        // 拖拽事件

            this.classList.add('dragover');
        });
        userUploadArea.addEventListener('dragleave', function(e) {
            e.preventDefault();
            this.classList.remove('dragover');
        });
        userUploadArea.addEventListener('drop', function(e) {
            e.preventDefault();
            this.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                document.getElementById('userExcelFileInput').files = files;
                handleUserFileSelect({ target: { files: files } });
            }
        });

        // ====== 账号格式校验 ======
        const ACCOUNT_RULES = {
            teacher: { pattern: /^\d{4}$/, hint: '教师账号：4位数字，如 1001' },
            student: { pattern: /^\d{10}$/, hint: '学生学号：10位数字，如 2024001001' },
            class:    { pattern: /^\d{5}$/, hint: '班级账号：5位数字，如 25008' },
            admin:     { pattern: /^.{1,20}$/,  hint: '管理员：任意字符' }
        };

        function onUserRoleChange() {
            const role = document.getElementById('userRole').value;
            const input = document.getElementById('userEmployeeId');
            const tip = document.getElementById('accountTip');
            const rule = ACCOUNT_RULES[role] || ACCOUNT_RULES.admin;
            tip.textContent = rule.hint;
            input.placeholder = role === 'student' ? '10位学号' : (role === 'teacher' ? '4位工号' : (role === 'class' ? '5位班级号' : '请输入账号'));
            validateUserAccount();
        }

        function validateUserAccount() {
            const idEl = document.getElementById('userEmployeeId');
            const tip = document.getElementById('accountTip');
            const role = document.getElementById('userRole').value;
            const val = idEl.value.trim();
            const rule = ACCOUNT_RULES[role] || ACCOUNT_RULES.admin;

            if (!val) return true; // 空值不校验（required会处理）
            if (!rule.pattern.test(val)) {
                tip.style.color = '#EF4444';
                idEl.style.borderColor = '#EF4444';
                return false;
            }
            tip.style.color = '#64748b';
            idEl.style.borderColor = '';
            return true;
        }
    
        function openInlineModal(id){
            const el = document.getElementById(id);
            el.style.display = "flex";
        }

        function closeInlineModal(id){
            const el = document.getElementById(id);
            el.style.display = "none";
        }

        // 选项卡切换（内联确保执行）
        document.querySelectorAll('.tab-btn').forEach(function(btn) {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
                document.querySelectorAll('.tab-content').forEach(function(c) { c.classList.remove('active'); });
                this.classList.add('active');
                var tab = document.getElementById('tab-' + this.dataset.tab);
                if (tab) tab.classList.add('active');
                // 切换到异常账号时刷新
                if (this.dataset.tab === 'abnormal' && typeof refreshAbnormalAccounts === 'function') {
                    refreshAbnormalAccounts();
                }
            });
        });
    </script>
    <script src="/js/ai-chat.js"></script>
</body>
</html>
